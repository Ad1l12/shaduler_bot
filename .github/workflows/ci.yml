name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff check
        run: ruff check src/ tests/

      - name: ruff format
        run: ruff format --check src/ tests/

      - name: mypy
        run: mypy src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    # Integration tests use SQLite in-memory (aiosqlite) — no Postgres needed.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        # Required env vars are populated by pytest_configure in conftest.py
        # (TELEGRAM_BOT_TOKEN, TELEGRAM_WEBHOOK_SECRET, GOOGLE_CLIENT_*, ENCRYPTION_KEY).
        # No external services are needed.
        run: pytest --cov=src --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false
